<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b3fd9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5cfc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" opacity="0.15"/>
  
  <!-- Robot head - rounded square -->
  <rect x="28" y="32" width="72" height="60" rx="16" fill="url(#grad1)"/>
  
  <!-- Face plate -->
  <rect x="36" y="40" width="56" height="44" rx="10" fill="#1a1828"/>
  
  <!-- Left eye - cute wink -->
  <ellipse cx="50" cy="56" rx="8" ry="9" fill="#7c5cfc"/>
  <ellipse cx="50" cy="54" rx="4" ry="5" fill="white"/>
  <circle cx="52" cy="52" r="2" fill="#1a1828"/>
  
  <!-- Right eye - happy arc -->
  <path d="M66 52 Q74 48 82 52" stroke="#7c5cfc" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Cute blush -->
  <ellipse cx="42" cy="64" rx="6" ry="3" fill="#ff6b9d" opacity="0.5"/>
  <ellipse cx="86" cy="64" rx="6" ry="3" fill="#ff6b9d" opacity="0.5"/>
  
  <!-- Smile -->
  <path d="M52 70 Q64 80 76 70" stroke="#7c5cfc" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="64" y1="32" x2="64" y2="20" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="16" r="5" fill="url(#grad1)"/>
  <circle cx="64" cy="16" r="2" fill="#1a1828"/>
  
  <!-- Left ear/antenna -->
  <line x1="32" y1="36" x2="22" y2="24" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="20" cy="22" r="4" fill="url(#grad1)"/>
  
  <!-- Right ear/antenna -->
  <line x1="96" y1="36" x2="106" y2="24" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="108" cy="22" r="4" fill="url(#grad1)"/>
  
  <!-- Code brackets decoration -->
  <text x="14" y="78" font-family="monospace" font-size="14" fill="#7c5cfc" opacity="0.6">&lt;</text>
  <text x="102" y="78" font-family="monospace" font-size="14" fill="#7c5cfc" opacity="0.6">/&gt;</text>
  
  <!-- Small stars -->
  <circle cx="18" cy="48" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="110" cy="52" r="1.5" fill="#34d399" opacity="0.7"/>
  <circle cx="24" cy="88" r="1.5" fill="#60a5fa" opacity="0.7"/>
</svg>
